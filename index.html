  <!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="القرآن الكريم">
<title>القرآن الكريم</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--gold:#C9A84C;--dark:#0D1117;--card:#161B22;--card2:#1C2128;--text:#E6D5B8;--muted:#8B7355;--border:#30261A}
body{font-family:'Segoe UI',Tahoma,Arial,sans-serif;background:var(--dark);color:var(--text);min-height:100vh;background-image:radial-gradient(ellipse at top,#1a1200 0%,var(--dark) 70%)}
nav{position:sticky;top:0;z-index:100;background:rgba(13,17,23,0.97);backdrop-filter:blur(10px);border-bottom:1px solid var(--border);padding:0 20px;display:flex;align-items:center;justify-content:space-between;height:64px}
.logo{font-size:1.3rem;font-weight:800;color:var(--gold)}
.search-box{display:flex;align-items:center;gap:8px;background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:8px 14px;width:200px}
.search-box input{background:none;border:none;color:var(--text);font-size:.9rem;outline:none;width:100%;font-family:inherit}
.search-box input::placeholder{color:var(--muted)}
section{display:none;padding:24px 20px;max-width:900px;margin:0 auto}
section.active{display:block}
.hero{text-align:center;padding:30px 20px 20px}
.hero h1{font-size:1.8rem;color:var(--gold);margin-bottom:6px;font-weight:800}
.hero p{color:var(--muted);font-size:.9rem}
.filter-tabs{display:flex;gap:8px;margin:16px 0;flex-wrap:wrap;justify-content:center}
.tab{padding:6px 18px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;font-size:.85rem;transition:all .2s;font-family:inherit}
.tab.active,.tab:hover{background:var(--gold);color:#0D1117;border-color:var(--gold);font-weight:700}
.surahs-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px;margin-top:10px}
.surah-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;cursor:pointer;transition:all .2s;text-align:center;position:relative}
.surah-card:hover{border-color:var(--gold);background:var(--card2);transform:translateY(-1px)}
.surah-num{position:absolute;top:8px;left:8px;width:28px;height:28px;border-radius:6px;background:linear-gradient(135deg,var(--gold),#8B6914);display:flex;align-items:center;justify-content:center;font-size:.75rem;font-weight:800;color:#0D1117}
.surah-arabic{font-size:1.15rem;color:var(--gold);font-weight:700;margin:18px 0 6px}
.surah-type{font-size:.72rem;color:var(--muted);margin-bottom:2px}
.surah-ayahs{font-size:.72rem;color:var(--muted)}
.surah-header{background:linear-gradient(135deg,#1a1200,var(--card));border:1px solid var(--border);border-radius:16px;padding:24px;text-align:center;margin-bottom:20px}
.back-btn{display:flex;align-items:center;gap:8px;color:var(--gold);cursor:pointer;font-size:.9rem;margin-bottom:16px;width:fit-content}
.back-btn:hover{opacity:.8}
.surah-title{font-size:1.8rem;color:var(--gold);font-weight:800;margin-bottom:4px}
.surah-subtitle{color:var(--muted);font-size:.85rem}
.bismillah{font-size:1.3rem;color:var(--gold);margin-top:14px}
.ayah{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:18px;margin-bottom:10px;transition:all .2s}
.ayah:hover{border-color:var(--gold)}
.ayah-text{font-size:1.45rem;line-height:2.2;color:var(--text);text-align:right;direction:rtl}
.ayah-num{display:inline-flex;align-items:center;justify-content:center;width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,var(--gold),#8B6914);color:#0D1117;font-size:.78rem;font-weight:800;margin-right:6px}
.ayah-translation{font-size:.83rem;color:var(--muted);margin-top:10px;line-height:1.7;border-top:1px solid var(--border);padding-top:10px;direction:ltr;text-align:left}
.loading{text-align:center;padding:60px;color:var(--muted)}
.spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:40px;color:var(--muted);grid-column:1/-1}
@media(max-width:600px){.surahs-grid{grid-template-columns:repeat(3,1fr)}.search-box{width:150px}}
</style>
</head>
<body>

<nav>
  <div class="logo">☪️ القرآن الكريم</div>
  <div class="search-box">
    <span>🔍</span>
    <input id="searchInput" placeholder="ابحث عن سورة..." oninput="filterSurahs(this.value)">
  </div>
</nav>

<section id="home" class="active">
  <div class="hero">
    <h1>القرآن الكريم</h1>
    <p>اختر سورة للقراءة</p>
  </div>
  <div class="filter-tabs">
    <button class="tab active" onclick="filterType('all',this)">الكل</button>
    <button class="tab" onclick="filterType('meccan',this)">مكية</button>
    <button class="tab" onclick="filterType('medinan',this)">مدنية</button>
  </div>
  <div id="surahsGrid" class="surahs-grid">
    <div class="loading" style="grid-column:1/-1"><div class="spinner"></div>جاري التحميل...</div>
  </div>
</section>

<section id="surah">
  <div class="back-btn" onclick="goHome()">← رجوع للسور</div>
  <div id="surahContent"></div>
</section>

<script>
let allSurahs=[];
let currentFilter='all';

async function loadSurahs(){
  try{
    const res=await fetch('https://api.alquran.cloud/v1/surah');
    const data=await res.json();
    allSurahs=data.data;
    renderSurahs(allSurahs);
  }catch(e){
    document.getElementById('surahsGrid').innerHTML='<div class="empty">❌ تعذر التحميل، تحقق من الإنترنت</div>';
  }
}

function renderSurahs(surahs){
  const grid=document.getElementById('surahsGrid');
  if(!surahs.length){grid.innerHTML='<div class="empty">لا توجد نتائج</div>';return;}
  grid.innerHTML=surahs.map(s=>`
    <div class="surah-card" onclick="loadSurah(${s.number})">
      <div class="surah-num">${s.number}</div>
      <div class="surah-arabic">${s.name}</div>
      <div class="surah-type">${s.revelationType==='Meccan'?'مكية':'مدنية'}</div>
      <div class="surah-ayahs">${s.numberOfAyahs} آية</div>
    </div>
  `).join('');
}

function filterSurahs(query){
  let filtered=allSurahs;
  if(currentFilter!=='all') filtered=filtered.filter(s=>currentFilter==='meccan'?s.revelationType==='Meccan':s.revelationType==='Medinan');
  if(query) filtered=filtered.filter(s=>s.name.includes(query)||s.number.toString()===query);
  renderSurahs(filtered);
}

function filterType(type,btn){
  currentFilter=type;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  filterSurahs(document.getElementById('searchInput').value);
}

async function loadSurah(num){
  document.querySelectorAll('section').forEach(s=>s.classList.remove('active'));
  document.getElementById('surah').classList.add('active');
  document.getElementById('surahContent').innerHTML='<div class="loading"><div class="spinner"></div>جاري تحميل السورة...</div>';
  window.scrollTo(0,0);
  try{
    const [arRes,enRes]=await Promise.all([
      fetch(`https://api.alquran.cloud/v1/surah/${num}`),
      fetch(`https://api.alquran.cloud/v1/surah/${num}/en.asad`)
    ]);
    const surah=(await arRes.json()).data;
    const translations=(await enRes.json()).data.ayahs;
    const isTawbah=num===9;
    let html=`
      <div class="surah-header">
        <div class="surah-title">${surah.name}</div>
        <div class="surah-subtitle">${surah.revelationType==='Meccan'?'مكية':'مدنية'} • ${surah.numberOfAyahs} آية</div>
        ${!isTawbah?'<div class="bismillah">بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ</div>':''}
      </div>
    `;
    html+=surah.ayahs.map((ayah,i)=>`
      <div class="ayah">
        <div class="ayah-text">
          <span class="ayah-num">${ayah.numberInSurah}</span>
          ${ayah.text}
        </div>
        ${translations[i]?`<div class="ayah-translation">${translations[i].text}</div>`:''}
      </div>
    `).join('');
    document.getElementById('surahContent').innerHTML=html;
  }catch(e){
    document.getElementById('surahContent').innerHTML='<div class="empty">❌ تعذر تحميل السورة</div>';
  }
}

function goHome(){
  document.querySelectorAll('section').forEach(s=>s.classList.remove('active'));
  document.getElementById('home').classList.add('active');
  window.scrollTo(0,0);
}

loadSurahs();
</script>
</body>
</html>
    
  </body>
  
</html>
